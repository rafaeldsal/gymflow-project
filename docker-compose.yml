services:

  postgres:
    image: postgres:17
    container_name: gymflow-postgres
    restart: always
    environment:
      POSTGRES_DB: gymflow
      POSTGRES_USER: gymflow_database
      POSTGRES_PASSWORD: senha123
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gymflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymflow_database -d gymflow"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ============================================================
  # ELASTICSEARCH - Armazenamento e busca
  # ============================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: gymflow-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - gymflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # LOGSTASH - Processamento de logs
  # ============================================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.1
    container_name: gymflow-logstash
    environment:
      - ENVIRONMENT=${SPRING_PROFILES_ACTIVE:-dev}
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
    ports:
      - "5044:5044" # TCP input para logs
      - "9600:9600" # HTTP API para monitoramento
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logs:/var/log/gymflow:ro
    networks:
      - gymflow-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9600/_node/stats" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # KIBANA - Visualização e dashboards
  # ============================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: gymflow-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=gymflow_kibana_encryption_key_2026
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - gymflow-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5601/api/status" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # METRICBEAT - Coleta de métricas do sistema (opcional)
  # ============================================================
  metricbeat:
    image: docker.elastic.co/beats/metricbeat:8.11.1
    container_name: gymflow-metricbeat
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro
      - /proc:/hostfs/proc:ro
      - /:/hostfs:ro
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - gymflow-network

networks:
    gymflow-network:
        driver: bridge

volumes:
  elasticsearch-data:
    driver: local
  postgres-data:
