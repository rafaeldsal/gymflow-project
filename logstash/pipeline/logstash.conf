# ================================================================
# CONFIGURAÇÃO DO LOGSTASH
# ================================================================

# ================================================================
# INPUT: De onde vêm os logs?
# ================================================================
input {
    # Opção 1: Receber via TCP (recomendado)
    tcp {
        port => 5044
        codec => json_lines
        type => "gymflow-logs"
    }

    # Opção 2: Ler de arquivo (fallback)
    # file {
    #     path => "/var/log/gymflow/*.log"
    #     codec => json
    #     start_position => "beginning"
    #     sincedb_path => "/dev/null"
    # }
}

# ================================================================
# FILTER: Processamento e enriquecimento dos logs
# ================================================================
filter {
    # 1. Parse do JSON (já está em JSON pelo Logback)
    json {
        source => "message"
        remove_field => ["message"]
    }

    # 2. Extrair campos do MDC
    if [mdc] {
        # Extrair correlationId
        if [mdc][correlationId] {
            mutate {
                add_field => { "correlationId" => "%{[mdc][correlationId]}" }
            }
        }

        # Extrair tenantId
        if [mdc][tenantId] {
            mutate {
                add_field => { "tenantId" => "%{[mdc][tenantId]}" }
            }
        }

        # Extrair userId
        if [mdc][userId] {
            mutate {
                add_field => { "userId" => "%{[mdc][userId]}" }
            }
        }

        # Extrair className e methodName
        if [mdc][className] {
            mutate {
                add_field => { "className" => "%{[mdc][className]}" }
            }
        }
        if [mdc][methodName] {
            mutate {
                add_field => { "methodName" => "%{[mdc][methodName]}" }
            }
        }
    }

    # 3. Converter timestamp
    if [timestamp] {
        date {
            match => [ "timestamp", "ISO8601" ]
            target => "@timestamp"
            remove_field => ["timestamp"]
        }
    }

    # 4. Extrair dados de negócio (se houver)
    if [data] {
        # Se data for um objeto JSON, manter como está
        # Se for string, tentar parsear
    }

    # 5. Adicionar campos úteis
    mutate {
        # Garantir que campos obrigatórios existam
        add_field => {
            "environment" => "${ENVIRONMENT:-unknown}"
            "service" => "gymflow"
            "application" => "gymflow-api"
        }

        # Remover campos desnecessários
        remove_field => [
            "host",
            "port",
            "@version"
        ]
    }

    # 6. Extrair IP e User-Agent (se disponível)
    if [headers] {
        if [headers][x-forwarded-for] {
            mutate {
                add_field => { "clientIp" => "%{[headers][x-forwarded-for]}" }
            }
        } else if [headers][x-forwarded] {
            mutate {
                add_field => { "clientIp" => "%{[headers][x-forwarded]}" }
            }
        } else if [headers][x-real-ip] {
            mutate {
                add_field => { "clientIp" => "%{[headers][x-real-ip]}" }
            }
        }

        if [headers][user-agent] {
            mutate {
                add_field => { "userAgent" => "%{[headers][user-agent]}" }
            }
        }
    }

    # 7. Extrair URL e método HTTP (se for log de requisição)
    if [message] and [message] =~ /REQUEST:/ {
        grok {
            match => {
                "message" => "REQUEST: (?<httpMethod>[A-Z]+) (?<httpUrl>[^ ]+)"
            }
            remove_field => ["message"]
        }
    }

    if [message] and [message] =~ /RESPONSE:/ {
        grok {
            match => {
                "message" => "RESPONSE: [A-Z]+ [^ ]+ - Status: (?<httpStatus>[0-9]+), Duration: (?<duration>[0-9]+)ms"
            }
            remove_field => ["message"]
        }
    }
}

# ================================================================
# OUTPUT: Para onde enviar os logs processados?
# ================================================================
output {
    # 1. Elasticsearch - destino principal
    elasticsearch {
        hosts => ["${ELASTICSEARCH_HOST:-elasticsearch}:${ELASTICSEARCH_PORT:-9200}"]
        index => "gymflow-logs-%{+YYYY.MM.dd}"
        # user => "${ELASTICSEARCH_USER:-elastic}"    # Descomente se tiver autenticação
        # password => "${ELASTICSEARCH_PASSWORD:-changeme}"  # Descomente se tiver autenticação
        # ssl => false
    }

    # 2. Console (para debug do Logstash)
    # stdout {
    #     codec => rubydebug
    # }

    # 3. Saída para arquivo (backup)
    # file {
    #     path => "/var/log/logstash/gymflow-logs-%{+YYYY-MM-dd}.log"
    #     codec => json_lines
    # }
}