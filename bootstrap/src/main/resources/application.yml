spring:
  profiles:
    active: dev

  application:
    name: gymflow

  # ===== DATABASE CONFIGURATION =====
  datasource:
    url: jdbc:postgresql://localhost:5432/gymflow
    username: gymflow_database
    password: senha123
    driver-class-name: org.postgresql.Driver

  # ===== JPA CONFIGURATION =====
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

    # ==== FLYWAY CONFIGURATION =====
    flyway:
      enabled: true
      locations: classpath:db/migration
      baseline-on-migrate: true
      baseline-version: 1
      table: flyway_schema_history

# ===== SERVER CONFIGURATION =====
server:
  port: 8080
  servlet:
    context-path: /ws-gymflow

# ===== LOGGING CONFIGURATION =====
logging:
  level:
    com.gymflow: INFO
    com.gymflow.shared: DEBUG
    com.gymflow.student: DEBUG
    com.gymflow.student.application.usecase: INFO
    org.springframework.web: INFO
    org.hibernate: WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

  file:
    name: logs/gymflow.log
    max-size: 10MB
    max-history: 30

# ===== MDC CONFIGURATION =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
